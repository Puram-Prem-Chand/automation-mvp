name: CI CD - Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa

      - name: Prepare remote directory
        run: |
          ssh -o StrictHostKeyChecking=no -i id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "rm -rf ~/app && mkdir -p ~/app"

      - name: Copy app to server
        run: |
          scp -o StrictHostKeyChecking=no -i id_rsa -r app/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/app/

      - name: Build and run
        run: |
          ssh -o StrictHostKeyChecking=no -i id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} <<'EOS'
            cd ~/app
            docker build -t project-mvp:latest .
            docker stop project-mvp || true
            docker rm project-mvp || true
            docker run -d --name project-mvp --restart unless-stopped -p 80:80 project-mvp:latest
            docker ps --filter name=project-mvp
EOS
